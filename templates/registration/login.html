{% extends 'base.html' %}

{% block content %}
<section class="auth-card">
    <div class="section-head">
        <div>
            <h2>Entrar</h2>
            <p>Acesse sua conta para criar e editar livros.</p>
        </div>
    </div>

    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <div class="field-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <p class="error-text">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit">Login</button>
            <a class="button button-secondary" href="{% url 'signup' %}">Criar conta</a>
        </div>
    </form>
</section>
{% endblock %}
