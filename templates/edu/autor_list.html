{% extends 'base.html' %}
{% block content %}
<div class="section-head">
    <div>
        <h2>Autores</h2>
        <p>Organize os autores vinculados ao acervo.</p>
    </div>
    <a class="button button-primary" href="{% url 'autor_create' %}">Novo autor</a>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Acoes</th>
            </tr>
        </thead>
        <tbody>
            {% for autor in autores %}
            <tr>
                <td>{{ autor.id }}</td>
                <td>{{ autor.nome }}</td>
                <td>
                    <a class="button button-warning" href="{% url 'edit_autores' autor.id %}">Editar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="muted">Nenhum autor cadastrado.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
