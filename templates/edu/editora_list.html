{% extends 'base.html' %}
{% block content %}
<div class="section-head">
    <div>
        <h2>Editoras</h2>
        <p>Gerencie as editoras relacionadas aos livros cadastrados.</p>
    </div>
    <a class="button button-primary" href="{% url 'editora_create' %}">Nova editora</a>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Acoes</th>
            </tr>
        </thead>
        <tbody>
            {% for editora in editoras %}
            <tr>
                <td>{{ editora.id }}</td>
                <td>{{ editora.nome }}</td>
                <td>
                    <a class="button button-warning" href="{% url 'edit_editoras' editora.id %}">Editar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="muted">Nenhuma editora cadastrada.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
